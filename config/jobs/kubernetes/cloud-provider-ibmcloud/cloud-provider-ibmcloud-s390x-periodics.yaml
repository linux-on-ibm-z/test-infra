  - name: ci-kubernetes-s390x-conformance-latest
    cron: "0 2-23/4 * * *" # every 4h starting at 02:00 UTC
    cluster: k8s-infra-s390x-prow-build
    labels:
      preset-ibmcloud-cred-z: "true"
    decorate: true
    decoration_config:
      timeout: 300m
    extra_refs:
      - base_ref: main
        org: kubernetes-sigs
        repo: provider-ibmcloud-test-infra
        workdir: true
    annotations:
      description: Runs conformance tests using kubetest2 against kubernetes ci latest on IBM VPC
      fork-per-release: "true"
      fork-per-release-cron: 0 1 * * *, 0 5 * * *, 0 9 * * *, 0 13 * * *, 0 17 * * *
      fork-per-release-replacements: "MARKER_VERSION=latest.txt -> MARKER_VERSION=latest-{{.Version}}.txt"
      testgrid-dashboards: ibm-s390x-k8s, conformance-s390x, ibm-k8s-e2e
      testgrid-tab-name: ci-kubernetes-s390x-conformance-latest-master
      testgrid-alert-email: sig-cloud-provider-ibm-s390x-alerts@kubernetes.io
      testgrid-num-failures-to-alert: '2'
    spec:
      containers:
        - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260512-1f34ef0df3-master
          securityContext:
            privileged: true
          env:
            - name: "BOSKOS_HOST"
              value: "boskos.test-pods.svc.cluster.local"
            - name: "USER"
              value: "ci-kubernetes-s390x-conformance-latest-kubetest2"
          resources:
            requests:
              cpu: 4
              memory: "14Gi"
            limits:
              cpu: 4
              memory: "14Gi"
          command:
            - runner.sh
          args:
            - bash
            - -c
            - |
              set -o xtrace
              set +o errexit
              export PATH=$GOPATH/bin:$PATH
              export GO111MODULE=on
              RESOURCE_TYPE="vpc-service"

              #Call to boskos to checkout resource
              heartbeat_account(){
                count=0
                url="http://${BOSKOS_HOST}/update?name=${BOSKOS_RESOURCE_NAME}&state=busy&owner=${USER}"
                while [ ${count} -lt 120 ]
                do
                  status_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST ${url})
                  if [[ ${status_code} != 200 ]]; then
                    echo "Heart beat to resource '${BOSKOS_RESOURCE_NAME}' failed due to invalid response, status code: ${status_code}"
                    exit 1
                  fi
                  count=$(( $count + 1 ))
                  sleep 60
                done
              }

              if [ -n "${BOSKOS_HOST:-}" ]; then
                set +o xtrace
                url="http://${BOSKOS_HOST}/acquire?type=${RESOURCE_TYPE}&state=free&dest=busy&owner=${USER}"
                output=$(curl -v -X POST ${url})
                [ $? = 0 ] && status_code=200

                if [[ ${status_code} == 200 && ${output} =~ "failed" ]]; then
                  echo "Failed to acquire resource from Boskos of type ${RESOURCE_TYPE}"
                  exit 1
                elif [[ ${status_code} == 200 ]]; then
                  export BOSKOS_RESOURCE_NAME=$(echo ${output} | jq -r '.name')
                  export BOSKOS_REGION=$(echo ${output} | jq -r '.userdata["region"]')
                  export BOSKOS_RESOURCE_GROUP=$(echo ${output} | jq -r '.userdata["resource-group-name"]')
                  export BOSKOS_ZONE=$(echo ${output} | jq -r '.userdata["zone"]')
                  export BOSKOS_SUBNET_NAME=$(echo ${output} | jq -r '.userdata["subnet-name"]')
                  export BOSKOS_SUBNET_ID=$(echo ${output} | jq -r '.userdata["subnet-id"]')
                  rm -rf output.json
                else
                  echo "Failed to acquire resource due to invalid response, status code : ${status_code}"
                  exit 1
                fi
                heartbeat_account >> "$ARTIFACTS/boskos.log" 2>&1 &
                HEART_BEAT_PID=$(echo $!)
              fi

              MARKER_VERSION=latest.txt;
              K8S_BUILD_VERSION=$(curl -Ls https://dl.k8s.io/ci/$MARKER_VERSION);

              #Setup of kubetest2 tf deployer
              make install-deployer-tf
              go install sigs.k8s.io/kubetest2/kubetest2-tester-ginkgo@latest

              kubetest2 tf --target-provider vpc --vpc-node-image-name ibm-ubuntu-22-04-4-minimal-s390x-3 \
              --boskos-resource-type vpc --vpc-region ${BOSKOS_REGION} --vpc-zone ${BOSKOS_ZONE} \
              --vpc-subnet ${BOSKOS_SUBNET_NAME} --vpc-name ${BOSKOS_RESOURCE_NAME} \
              --vpc-resource-group ${BOSKOS_RESOURCE_GROUP} \
              --vpc-ssh-key k8s-s390x-ssh-key \
              --vpc-node-profile bz2-4x16 --ssh-private-key /etc/secret-volume/ssh-privatekey \
              --extra-vars=ansible_user:k8s-admin --extra-vars=ansible_become:true \
              --extra-vars=ansible_become_method:sudo \
              --extra-vars=k8s_tar_bundles:kubernetes-server-linux-s390x.tar.gz \
              --extra-vars=pod_subnet:10.244.0.0/16 --extra-vars=cni_provider:flannel \
              --workers-count 2 --cluster-name conformance-$(date +%s) --up --down --auto-approve \
              --retry-on-tf-failure 3 --break-kubetest-on-upfail true --ignore-destroy-errors \
              --build-version $K8S_BUILD_VERSION --release-marker $K8S_BUILD_VERSION \
              --test=ginkgo -- --test-package-dir ci --test-package-marker $MARKER_VERSION \
              --focus-regex='\[Conformance\]'
              if [ -n "${BOSKOS_HOST:-}" ]; then
                url="http://${BOSKOS_HOST}/release?name=${BOSKOS_RESOURCE_NAME}&dest=dirty&owner=${USER}"
                status_code=$(curl  -s -o /dev/null -w '%{http_code}' -X POST ${url})
                if [[ ${status_code} != 200 ]]; then
                  echo "Failed to release resource: ${BOSKOS_RESOURCE_NAME}"
                  exit 1
                fi
              fi
