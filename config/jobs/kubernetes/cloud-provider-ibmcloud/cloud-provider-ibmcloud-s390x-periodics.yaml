periodics:
  - name: ci-kubernetes-unit-s390x
    interval: 1h
    cluster: k8s-infra-s390x-prow-build
    decorate: true
    extra_refs:
      - org: kubernetes
        repo: kubernetes
        base_ref: master
        path_alias: k8s.io/kubernetes
    annotations:
      testgrid-dashboards: ibm-s390x-periodics, ibm-s390x-k8s
      testgrid-tab-name: ci-kubernetes-unit-s390x
    spec:
      # unit tests have no business requiring root or doing privileged operations
      securityContext:
        # NOTE: these are arbitrary non-root values. They don't exist in the
        # image and don't need to, the unit tests should only write to TMPDIR
        runAsGroup: 2010
        runAsUser: 2001
      containers:
        - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260512-1f34ef0df3-master
          command:
            - make
            - test
          env:
            - name: KUBE_TIMEOUT
              value: "-timeout=300s"
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 6
              memory: "16Gi"
            limits:
              cpu: 6
              memory: "16Gi"

  - name: ci-kubernetes-integration-master-s390x
    interval: 1h
    cluster: k8s-infra-s390x-prow-build
    decorate: true
    extra_refs:
    - org: kubernetes
      repo: kubernetes
      base_ref: master
      path_alias: k8s.io/kubernetes
    annotations:
      testgrid-dashboards: ibm-s390x-k8s, ibm-s390x-periodics
      testgrid-tab-name: ci-kubernetes-integration-master-s390x
      description: "Ends up running: make test-integration"
    spec:
      containers:
      - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260512-1f34ef0df3-master
        command:
        - runner.sh
        args:
        - ./hack/jenkins/test-integration-dockerized.sh
        env:
        - name: SHORT
          value: --short=false
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        resources:
          limits:
            cpu: 6
            memory: 20Gi
          requests:
            cpu: 6
            memory: 20Gi

